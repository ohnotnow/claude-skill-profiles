name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
          - goos: windows
            goarch: arm64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          ext=""
          if [ "$GOOS" = "windows" ]; then ext=".exe"; fi
          VERSION="${GITHUB_REF_NAME}"
          REPO_URL="https://github.com/${{ github.repository }}"
          go build \
            -ldflags "-X claude-skill-profiles/cmd.Version=${VERSION} -X claude-skill-profiles/cmd.RepoURL=${REPO_URL}" \
            -o "csp-${GOOS}-${GOARCH}${ext}" \
            .

      - uses: actions/upload-artifact@v4
        with:
          name: csp-${{ matrix.goos }}-${{ matrix.goarch }}
          path: csp-*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Generate checksums
        run: sha256sum csp-* > SHA256SUMS

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            csp-*
            SHA256SUMS
